<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHome OS | Pro Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .log-entry { border-left: 4px solid #6366f1; background: rgba(255,255,255,0.05); }
        iframe { border-radius: 12px; filter: invert(90%) hue-rotate(180deg) brightness(1.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
            <h1 class="text-2xl font-bold text-blue-500">SmartHome OS</h1>
            <div class="flex items-center bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <span id="status-text" class="text-xs font-mono font-bold text-green-500 text-uppercase">System Online</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-2 rounded-2xl">
                    <iframe width="100%" height="200" src="https://thingspeak.com/channels/3347171/charts/1?bgcolor=%23ffffff&color=%233b82f6&dynamic=true"></iframe>
                </div>
                <div class="glass p-2 rounded-2xl">
                    <iframe width="100%" height="200" src="https://thingspeak.com/channels/3347171/charts/2?bgcolor=%23ffffff&color=%2310b981&dynamic=true"></iframe>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl flex flex-col h-full border-t-4 border-indigo-500">
                <h2 class="text-xl font-bold mb-4 flex items-center">🕒 Security Logs</h2>
                <div id="log-container" class="flex-1 overflow-y-auto space-y-3 max-h-[420px] pr-2">
                    <p id="no-logs" class="text-slate-500 text-sm italic text-center">Waiting for activity...</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">🌀 Fan</h2>
                <select onchange="publish('smarthome/fan_mode', this.value)" class="w-full bg-slate-900 p-2 rounded mb-4">
                    <option value="AUTO">AUTO</option>
                    <option value="MANUAL">MANUAL</option>
                </select>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">💡 Light</h2>
                <select onchange="publish('smarthome/led_mode', this.value)" class="w-full bg-slate-900 p-2 rounded mb-4">
                    <option value="AUTO">AUTO</option>
                    <option value="MANUAL">MANUAL</option>
                </select>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">🔒 Lock</h2>
                <div id="lock-icon" class="text-center text-4xl mb-4">🔒</div>
                <button onclick="publish('smartlock/command', 'UNLOCK')" class="w-full bg-indigo-600 p-3 rounded-xl font-bold hover:bg-indigo-500">UNLOCK</button>
            </div>
        </div>
    </div>

    <script>
        const client = mqtt.connect('wss://4a5c7617d0b449afb71fdbe930eda17c.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32user', password: 'Diddyvyansh@07'
        });

        client.on('connect', () => {
            client.subscribe("smarthome/room_sensors");
            client.subscribe("smartlock/status");
        });

        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());

            if (topic === "smartlock/status") {
                // 1. Update Lock Icon
                document.getElementById('lock-icon').innerText = data.locked ? "🔒" : "🔓";
                
                // 2. Add to RFID Logs if it's an "Unlock" event
                if (data.locked === false) {
                    addLog(data.status);
                }
            }
        });

        function addLog(source) {
            const container = document.getElementById('log-container');
            const noLogs = document.getElementById('no-logs');
            if (noLogs) noLogs.remove();

            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const entry = document.createElement('div');
            entry.className = "log-entry p-3 rounded-lg flex justify-between items-center animate-pulse";
            entry.innerHTML = `
                <div>
                    <p class="text-xs text-indigo-400 font-bold uppercase">${source}</p>
                    <p class="text-sm font-semibold text-white">Access Granted</p>
                </div>
                <div class="text-xs text-slate-500">${timeStr}</div>
            `;

            // Add new log to the top
            container.prepend(entry);
            
            // Remove pulse after 2 seconds
            setTimeout(() => entry.classList.remove('animate-pulse'), 2000);
        }

        function publish(topic, msg) { client.publish(topic, msg); }
    </script>
</body>
</html>
