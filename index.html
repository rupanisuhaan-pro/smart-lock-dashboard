<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartHome Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        iframe { filter: invert(90%) hue-rotate(180deg); border-radius: 8px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900 p-4 rounded-xl">
            <h1 class="text-xl font-bold text-blue-400">SMARTHOME OS</h1>
            <div id="status" class="text-xs text-green-500 font-mono">● SYSTEM ONLINE</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-4 rounded-xl text-center">
                        <p class="text-xs text-slate-400 uppercase">Temp</p>
                        <p class="text-2xl font-bold"><span id="t-val">--</span>°C</p>
                    </div>
                    <div class="glass p-4 rounded-xl text-center">
                        <p class="text-xs text-slate-400 uppercase">Light</p>
                        <p class="text-2xl font-bold"><span id="l-val">--</span></p>
                    </div>
                </div>
                <div class="glass p-2 rounded-xl">
                    <iframe width="100%" height="200" src="https://thingspeak.com/channels/3347171/charts/1?dynamic=true"></iframe>
                </div>
                <div class="glass p-2 rounded-xl">
                    <iframe width="100%" height="200" src="https://thingspeak.com/channels/3347171/charts/2?dynamic=true"></iframe>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-xl border-t-4 border-indigo-500">
                    <div id="lock-icon" class="text-4xl text-center mb-4">🔒</div>
                    <button onclick="secureUnlock()" class="w-full bg-indigo-600 p-3 rounded-lg font-bold">UNLOCK DOOR</button>
                </div>
                <div class="glass p-4 rounded-xl h-64 overflow-y-auto">
                    <h3 class="text-xs font-bold mb-3 text-slate-400">SECURITY ACTIVITY</h3>
                    <div id="logs" class="space-y-2 text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN = "1234"; // SET YOUR PIN HERE
        const client = mqtt.connect('wss://4a5c7617d0b449afb71fdbe930eda17c.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32user', password: 'Diddyvyansh@07'
        });

        client.on('connect', () => {
            client.subscribe("smarthome/room_sensors");
            client.subscribe("smartlock/status");
        });

        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            if (topic === "smarthome/room_sensors") {
                document.getElementById('t-val').innerText = data.temp;
                document.getElementById('l-val').innerText = data.light;
            }
            if (topic === "smartlock/status") {
                document.getElementById('lock-icon').innerText = data.locked ? "🔒" : "🔓";
                if(!data.locked) addLog(data.status);
            }
        });

        function secureUnlock() {
            if (prompt("Enter Security PIN:") === PIN) client.publish('smartlock/command', 'UNLOCK');
            else alert("Wrong PIN!");
        }

        function addLog(source) {
            const row = document.createElement('div');
            row.className = "bg-slate-800 p-2 rounded flex justify-between";
            row.innerHTML = `<span>${source}</span><span class="text-slate-500">${new Date().toLocaleTimeString()}</span>`;
            document.getElementById('logs').prepend(row);
        }
    </script>
</body>
</html>
