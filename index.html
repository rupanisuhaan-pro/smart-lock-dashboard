<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHome Pro Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
        .val-text { font-size: 2.5rem; font-weight: 800; color: #3b82f6; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">SmartHome OS</h1>
            <div id="status" class="text-xs font-mono bg-slate-800 px-3 py-1 rounded">CONNECTING...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl text-center">
                <p class="text-slate-400 text-sm uppercase">Temperature</p>
                <p class="val-text"><span id="temp-val">--</span><span class="text-xl">°C</span></p>
            </div>
            <div class="glass p-6 rounded-2xl text-center">
                <p class="text-slate-400 text-sm uppercase">Humidity</p>
                <p class="val-text"><span id="hum-val">--</span><span class="text-xl">%</span></p>
            </div>
            <div class="glass p-6 rounded-2xl text-center">
                <p class="text-slate-400 text-sm uppercase">Light Level</p>
                <p class="val-text"><span id="light-val">--</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">🌀 Fan Control</h2>
                <select onchange="sendMode('fan', this.value)" class="w-full bg-slate-900 border border-slate-700 p-2 rounded mb-4">
                    <option value="AUTO">Automatic Mode</option>
                    <option value="MANUAL">Manual Override</option>
                </select>
                <div id="fan-manual" class="hidden flex gap-2">
                    <button onclick="sendPower('fan', 'ON')" class="flex-1 bg-blue-600 p-2 rounded font-bold py-2">ON</button>
                    <button onclick="sendPower('fan', 'OFF')" class="flex-1 bg-red-600 p-2 rounded font-bold py-2">OFF</button>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">💡 Light Control</h2>
                <select onchange="sendMode('led', this.value)" class="w-full bg-slate-900 border border-slate-700 p-2 rounded mb-4">
                    <option value="AUTO">Automatic Mode</option>
                    <option value="MANUAL">Manual Override</option>
                </select>
                <div id="led-manual" class="hidden flex gap-2">
                    <button onclick="sendPower('led', 'ON')" class="flex-1 bg-yellow-600 p-2 rounded font-bold py-2">ON</button>
                    <button onclick="sendPower('led', 'OFF')" class="flex-1 bg-red-600 p-2 rounded font-bold py-2">OFF</button>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">🔒 Security</h2>
                <div id="lock-state" class="text-center text-4xl mb-4">🔒</div>
                <button onclick="publish('smartlock/command', 'UNLOCK')" class="w-full bg-indigo-600 p-3 rounded-xl font-bold">UNLOCK DOOR</button>
            </div>
        </div>
    </div>

    <script>
        const client = mqtt.connect('wss://4a5c7617d0b449afb71fdbe930eda17c.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32user', password: 'Diddyvyansh@07'
        });

        client.on('connect', () => {
            document.getElementById('status').innerText = "ONLINE";
            client.subscribe("smarthome/room_sensors");
            client.subscribe("smartlock/status");
        });

        function sendMode(device, mode) {
            document.getElementById(`${device}-manual`).classList.toggle('hidden', mode === 'AUTO');
            client.publish(`smarthome/${device}_mode`, mode);
        }

        function sendPower(device, state) {
            client.publish(`smarthome/${device}_power`, state);
        }

        function publish(topic, msg) { client.publish(topic, msg); }

        client.on('message', (topic, msg) => {
            const data = JSON.parse(msg.toString());
            
            // 1. Update Sensor UI
            if (topic === 'smarthome/room_sensors') {
                if(data.temp) document.getElementById('temp-val').innerText = data.temp.toFixed(1);
                if(data.hum) document.getElementById('hum-val').innerText = data.hum.toFixed(0);
                if(data.light !== undefined) document.getElementById('light-val').innerText = data.light;
            }

            // 2. Update Lock UI
            if (topic === 'smartlock/status') {
                document.getElementById('lock-state').innerText = data.locked ? "🔒" : "🔓";
            }
        });
    </script>
</body>
</html>
